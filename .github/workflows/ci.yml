name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          path: repo
          submodules: recursive
      - name: Validate GitHub Actions
        uses: docker://rhysd/actionlint@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667
        with:
          args: repo/.github/workflows/ci.yml repo/.github/workflows/cli-flags.yml
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          repository: fiducia-cloud/fiducia-interfaces
          ref: 6e20a3f4df2e52b99a0ad6add83d4528262b5dbc
          path: fiducia-interfaces
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          repository: fiducia-cloud/fiducia-clients
          ref: 5695b16a1577aadbfe414123927e45927f88a7f0
          path: fiducia-clients
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          repository: fiducia-cloud/fiducia-messaging.rs
          ref: cec4ea4f54162758858c6c284324c34a42f3f3d7
          path: fiducia-messaging.rs
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          repository: fiducia-cloud/fiducia-telemetry.rs
          ref: 20ed56d9e725c9189deb7386a2dee91ea8b25fdb
          path: fiducia-telemetry.rs
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: "1.97.0"
          components: rustfmt, clippy
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "25"
          cache: npm
          cache-dependency-path: repo/package-lock.json
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: repo
      - uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2
        with:
          tool: cargo-audit@0.22.2
      - name: Format
        working-directory: repo
        run: cargo fmt --all -- --check
      - name: Clippy
        working-directory: repo
        run: cargo clippy --all-targets --all-features --locked -- -D warnings
      - name: Test
        working-directory: repo
        run: cargo test --all-features --locked
      - name: Browser runtime tests
        working-directory: repo
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
          PUPPETEER_SKIP_DOWNLOAD: "true"
        run: |
          npm ci --ignore-scripts
          npm test
      - name: Release build
        working-directory: repo
        run: cargo build --release --locked
      - name: Dependency audit
        working-directory: repo
        run: cargo audit
